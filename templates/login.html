<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberSOC Lite - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #0f172a, #1e293b); color:white; height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="card p-4 shadow-lg" style="width:350px; background:#020617; border-radius:12px;">

    <!-- PROJECT TITLE -->
    <h3 class="text-center mb-3 text-white">🔐 CyberSOC Lite</h3>
<p class="text-center mb-4 text-white" style="font-size:14px;">
    Security Incident Management System
</p>

    <!-- LOGIN FORM -->
    <form method="POST">

        <input 
            name="username" 
            placeholder="Username" 
            class="form-control mb-3"
            required
        >

        <input 
            type="password" 
            name="password" 
            placeholder="Password" 
            class="form-control mb-3"
            required
        >

        <button class="btn btn-primary w-100">Login</button>

    </form>

</div>

</body>
</html>
